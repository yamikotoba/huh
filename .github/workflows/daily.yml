name: Daily VK Messages Analyzer

on:
  schedule:
    # 06:00 UTC это 09:00 по Москве (MSK = UTC+3)
    - cron: '0 6 * * *'
  workflow_dispatch: # Позволяет запускать вручную из интерфейса GitHub

jobs:
  analyze_and_send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run VK Downloader
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_PEER_IDS: ${{ secrets.VK_PEER_IDS }}
        run: python vk_downloader.py
        
      - name: Run Gemini Analyzer and Send to Telegram
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python run_agent.py
        
      - name: Commit and push state changes
        run: |
          # Чтобы не присылать одни и те же сообщения дважды нам нужно коммитить
          # изменения в state.json обратно в репозиторий.
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/state.json || true
          git commit -m "Auto-update state.json after run" || true
          git push
